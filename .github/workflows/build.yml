name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: vet & build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  release:
    name: cross-compile and publish release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build server + client for all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          TAG="${GITHUB_REF_NAME}"
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64
          do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            ext=""
            [ "$GOOS" = "windows" ] && ext=".exe"

            echo "==> building proxyy-server for $GOOS/$GOARCH"
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" \
              -o "dist/proxyy-server-${TAG}-${GOOS}-${GOARCH}${ext}" ./cmd/server

            echo "==> building proxyy (client) for $GOOS/$GOARCH"
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" \
              -o "dist/proxyy-${TAG}-${GOOS}-${GOARCH}${ext}" ./cmd/client
          done
          ls -la dist/

      - name: Generate checksums
        run: cd dist && sha256sum proxyy-* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
